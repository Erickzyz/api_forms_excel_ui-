<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação PokéShop - UI+</title>
    <style>
        :root {
            --pikachu-yellow: #FFCB05;
            --pokeball-blue: #3B4CCA;
            --charizard-orange: #F2802B;
            --bulba-green: #49D0B0;
            --bg-color: #F8F9FA;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            max-width: 650px;
            width: 100%;
        }

        h2 { color: var(--pokeball-blue); margin-bottom: 25px; }

        .field-group { margin-bottom: 25px; }
        
        label { display: block; margin-bottom: 8px; font-weight: 600; }

        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 12px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--pokeball-blue);
        }

        /* Rating Grid 0-10 */
        .rating-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(40px, 1fr));
            gap: 8px;
        }

        .rating-box {
            text-align: center;
            padding: 10px 0;
            border: 2px solid #eee;
            border-radius: 8px;
            cursor: pointer;
        }

        input[type="radio"]:checked + label.rating-box {
            background: var(--pokeball-blue);
            color: white;
            border-color: var(--pokeball-blue);
        }

        /* Recommendation Cards */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .option-card {
            padding: 20px;
            border: 2px solid #eee;
            border-radius: 16px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }

        input[type="radio"]:checked + .option-card {
            border-color: var(--pikachu-yellow);
            background-color: #fffdf0;
        }

        button {
            width: 100%;
            padding: 16px;
            background: var(--pikachu-yellow);
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<form class="container" action="https://docs.google.com/forms/d/e/1FAIpQLSc4jr16swDAg4CT3TD6V_JFxwO8f4MuLaift4qbBX-QwNwJCw/formResponse" method="POST">
    
    <h2>Avaliação PokéShop</h2>

    <div class="field-group">
        <label>Informe seu nome *</label>
        <input type="text" name="entry.977359702" placeholder="Treinador(a)..." required>
    </div>

    <div class="field-group">
        <label>Sua satisfação (0-10)</label>
        <div class="rating-grid">
            <script>
                for(let i=0; i<=10; i++) {
                    document.write(`
                        <input type="radio" id="r${i}" name="entry.1412467272" value="${i}" style="display:none">
                        <label for="r${i}" class="rating-box">${i}</label>
                    `);
                }
            </script>
        </div>
    </div>

    <div class="field-group">
        <label>Conte sua experiência</label>
        <textarea name="entry.210202849" rows="3" placeholder="Como foi sua jornada na loja?"></textarea>
    </div>

    <div class="field-group">
        <label>Você indicaria nossa loja?</label>
        <div class="options-grid">
            <input type="radio" id="op1" name="entry.845451432" value="Sim" style="display:none">
            <label for="op1" class="option-card">⚡<br>Sim!</label>

            <input type="radio" id="op2" name="entry.845451432" value="Não indicaria" style="display:none">
            <label for="op2" class="option-card">😴<br>Não</label>

            <input type="radio" id="op3" name="entry.845451432" value="Indicaria, mas com resalvas" style="display:none">
            <label for="op3" class="option-card">🤔<br>Ressalvas</label>

            <input type="radio" id="op4" name="entry.845451432" value="Indicaria depois de implementar mudanças" style="display:none">
            <label for="op4" class="option-card">🌱<br>Mudar algo</label>
        </div>
    </div>

    <button type="submit">Enviar Pokédex de Feedback</button>
</form>

</body>
</html>
